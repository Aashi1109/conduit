version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conduit-server
    image: aashishpal09/conduit:latest
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_TYPE: server
    env_file:
      - .env
    ports:
      - "3000:3000"

volumes:
  conduit-db-data:
